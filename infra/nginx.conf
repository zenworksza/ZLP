# ── npm (Verdaccio) ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name ${NPM_DOMAIN};
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}
server {
    listen 443 ssl;
    server_name ${NPM_DOMAIN};
    ssl_certificate     /etc/letsencrypt/live/${AUTHORITY_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${AUTHORITY_DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    location / {
        proxy_pass           http://verdaccio:4873;
        proxy_set_header     Host $host;
        proxy_read_timeout   600s;
        client_max_body_size 100m;
    }
}

# ── Default (health check + drop) ─────────────────────────────────────────
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    ssl_certificate     /etc/letsencrypt/live/${AUTHORITY_DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${AUTHORITY_DOMAIN}/privkey.pem;
    location = /v1/health {
        proxy_pass http://license-authority:8000/v1/health;
    }
    location / {
        return 444;
    }
}
