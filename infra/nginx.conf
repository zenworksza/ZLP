server {
    listen 80;
    server_name ${AUTHORITY_DOMAIN};

    location / {
        proxy_pass         http://license-authority:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

server {
    listen 80;
    server_name ${DASHBOARD_DOMAIN};

    location / {
        proxy_pass       http://dashboard:80;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name ${PACKAGES_DOMAIN};

    location / {
        proxy_pass       http://satis:80;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name ${NPM_DOMAIN};

    location / {
        proxy_pass           http://verdaccio:4873;
        proxy_set_header     Host $host;
        proxy_read_timeout   600s;
        client_max_body_size 100m;
    }
}

# Default — ALB health check pass-through, everything else dropped
server {
    listen 80 default_server;

    location = /v1/health {
        proxy_pass http://license-authority:8000/v1/health;
    }

    location / {
        return 444;
    }
}
