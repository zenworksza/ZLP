server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /v1/ {
        proxy_pass http://license-authority:8000/v1/;
        proxy_set_header Host $host;
    }

    location /dashboard/ {
        proxy_pass http://license-authority:8000/dashboard/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
